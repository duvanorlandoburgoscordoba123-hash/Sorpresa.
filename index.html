<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro chat 💬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.phone{
  width:360px;
  height:640px;
  background:#111b21;
  border-radius:35px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  overflow:hidden;
  position:relative;
}

.header{
  background:#202c33;
  color:white;
  padding:15px;
  font-size:18px;
}

.chat{
  padding:15px;
  height:480px;
  overflow-y:auto;
}

.msg{
  padding:10px 15px;
  border-radius:15px;
  margin:10px 0;
  max-width:75%;
  animation:fade 0.5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1}}

.yo{
  background:#005c4b;
  color:white;
  margin-left:auto;
}

.btnArea{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#25d366;
  color:white;
  font-size:16px;
  cursor:pointer;
}

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

@keyframes caer{
  0%{transform:translateY(-10vh);opacity:1}
  100%{transform:translateY(110vh);opacity:0}
}
</style>
</head>

<body>

<video id="video" loop playsinline>
  <source src="https://raw.githubusercontent.com/duvanorlandoburgoscordoba123-hash/Sorpresa./5ff4a88c2d22c549c1116d0dd1a855ab248091a5/eb2c0940c76e0b8a96065f4f27d1b4a2.mp4" type="video/mp4">
</video>

<div class="phone" id="app">
  <div class="header">💬 Tú & Yo</div>
  <div class="chat" id="chat"></div>
  <div class="btnArea">
    <button onclick="siguiente()">Enviar mensaje 💌</button>
  </div>
</div>

<script>
let videoIniciado=false;

let mensajes=[
"Hola 😊",
"Quería decirte algo...",
"No sabía cómo hacerlo 🙈",
"Así que hice esta web para ti 💻",
"Porque eres muy especial ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa alegra mis días ☀️",
"Y cada día me gustas más...",
"Así que quería preguntarte algo..."
];

let i=0;

function agregarMensaje(texto){
  let div=document.createElement("div");
  div.className="msg yo";
  div.innerHTML=texto;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=9999;
}

function siguiente(){
  if(!videoIniciado){
    let v=document.getElementById("video");
    v.style.display="block";
    v.muted=false;
    v.volume=1;
    v.play();
    videoIniciado=true;
  }

  if(i<mensajes.length){
    agregarMensaje(mensajes[i]);
    i++;
  }else{
    document.getElementById("app").innerHTML=
    "<div style='color:white;text-align:center;margin-top:180px'>" +
    "<h1>💖</h1><h2>¿Quieres salir conmigo?</h2>" +
    "<br><button onclick='poemaBenedetti()'>SI 💕</button>" +
    "<br><br><button onclick='poemaNeruda()'>OBVIO SI 😍</button>" +
    "<br><br><button onclick='poemaNo()'>NO 😳</button></div>";
  }
}

function lluviaCorazones(){
  setInterval(()=>{
    let c=document.createElement("div");
    c.innerHTML="💖";
    c.style.position="fixed";
    c.style.top="-20px";
    c.style.left=Math.random()*100+"vw";
    c.style.fontSize=(20+Math.random()*30)+"px";
    c.style.animation="caer 5s linear";
    document.body.appendChild(c);
    setTimeout(()=>{c.remove()},5000);
  },300);
}

/* BENDETTI */
function poemaBenedetti(){
document.body.innerHTML=`
<video autoplay loop style="position:fixed;width:100%;height:100%;object-fit:cover">
<source src="https://raw.githubusercontent.com/duvanorlandoburgoscordoba123-hash/Sorpresa./5ff4a88c2d22c549c1116d0dd1a855ab248091a5/eb2c0940c76e0b8a96065f4f27d1b4a2.mp4" type="video/mp4">
</video>

<div style="position:absolute;color:white;text-align:center;padding:40px;margin-top:15vh;font-size:30px">
Mi táctica es mirarte,<br>
aprender como eres,<br>
quererte como eres.<br><br>
Mi táctica es hablarte y escucharte,<br>
construir con palabras un puente indestructible.<br><br>
Mi táctica es quedarme en tu recuerdo…<br>
pero quedarme en ti 💕<br><br>
<h2>— Mario Benedetti</h2>
</div>`;
lluviaCorazones();
}

/* NERUDA */
function poemaNeruda(){
document.body.innerHTML=`
<video autoplay loop style="position:fixed;width:100%;height:100%;object-fit:cover">
<source src="https://raw.githubusercontent.com/duvanorlandoburgoscordoba123-hash/Sorpresa./5ff4a88c2d22c549c1116d0dd1a855ab248091a5/eb2c0940c76e0b8a96065f4f27d1b4a2.mp4" type="video/mp4">
</video>

<div style="position:absolute;color:white;text-align:center;padding:40px;margin-top:15vh;font-size:30px">
Quiero hacer contigo lo que la primavera hace con los cerezos 🌸<br><br>
Quiero llenar tu risa de besos,<br>
tu vida de aventuras,<br>
y tus días de abrazos infinitos.<br><br>
Eres la casualidad más bonita de mi vida ❤️<br><br>
<h2>— Pablo Neruda</h2>
</div>`;
lluviaCorazones();
}

/* NO */
function poemaNo(){
document.body.innerHTML=`
<video autoplay loop style="position:fixed;width:100%;height:100%;object-fit:cover">
<source src="https://raw.githubusercontent.com/duvanorlandoburgoscordoba123-hash/Sorpresa./5ff4a88c2d22c549c1116d0dd1a855ab248091a5/eb2c0940c76e0b8a96065f4f27d1b4a2.mp4" type="video/mp4">
</video>

<div style="position:absolute;color:white;text-align:center;padding:40px;margin-top:15vh;font-size:30px">
Entonces déjame intentarlo otra vez 💫<br><br>
Porque eres mi casualidad más bonita,<br>
la historia que no planeé pero que quiero vivir ❤️<br><br>
Fue el tiempo que pasaste con tu rosa lo que la hizo importante 🌹<br><br>
<h2>— Antoine de Saint-Exupéry</h2>
</div>`;
lluviaCorazones();
}
</script>

</body>
</html>
