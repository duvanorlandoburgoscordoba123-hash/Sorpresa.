<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro chat 💬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.phone{
  width:360px;
  height:640px;
  background:#111b21;
  border-radius:35px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  overflow:hidden;
  position:relative;
}

.header{
  background:#202c33;
  color:white;
  padding:15px;
  font-size:18px;
}

.chat{
  padding:15px;
  height:480px;
  overflow-y:auto;
}

.msg{
  padding:10px 15px;
  border-radius:15px;
  margin:10px 0;
  max-width:75%;
  animation:fade 0.5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1}}

.yo{
  background:#005c4b;
  color:white;
  margin-left:auto;
}

.btnArea{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#25d366;
  color:white;
  font-size:16px;
}

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
</style>
</head>

<body>

<!-- VIDEO CON SONIDO -->
<video id="video" loop>
  <source src="4ba1b517f1738a089eb6b9115b58477b.mp4" type="video/mp4">
</video>

<div class="phone" id="app">
  <div class="header">💬 Tú & Yo</div>
  <div class="chat" id="chat"></div>
  <div class="btnArea">
    <button onclick="siguiente()">Enviar mensaje 💌</button>
  </div>
</div>

<script>
let videoIniciado=false;

let mensajes=[
"Hola 😊",
"Quería decirte algo...",
"No sabía cómo hacerlo 🙈",
"Así que hice esta web para ti 💻",
"Porque eres muy especial ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa alegra mis días ☀️",
"Y cada día me gustas más...",
"Así que quería preguntarte algo..."
];

let i=0;

function agregarMensaje(texto){
  let div=document.createElement("div");
  div.className="msg yo";
  div.innerHTML=texto;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=9999;
}

function siguiente(){

  if(!videoIniciado){
    let v=document.getElementById("video");
    v.style.display="block";
    v.play();
    videoIniciado=true;
  }

  if(i<mensajes.length){
    agregarMensaje(mensajes[i]);
    i++;
  }else{
    document.getElementById("app").innerHTML=
    "<div style='color:white;text-align:center;margin-top:200px'>" +
    "<h1>💖</h1><h2>¿Quieres salir conmigo?</h2>" +
    "<br><button onclick='final()'>SI 💕</button>" +
    "<br><br><button onclick='final()'>OBVIO SI 😍</button></div>";
  }
}

function final(){
  document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh'>Sabía que dirías que sí 😍</h1>";
}
</script>

</body>
</html>
