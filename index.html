<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(120deg,#ff758c,#ff7eb3,#ffc3a0);
  overflow:hidden;
}

/* Fondo partículas */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:url("https://i.imgur.com/YKY28eT.png");
  animation: sparkle 60s linear infinite;
  opacity:0.4;
}
@keyframes sparkle{
  from{transform:translate(0,0);}
  to{transform:translate(-50%,-50%);}
}

/* Tarjeta */
.card{
  position:relative;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:40px;
  border-radius:25px;
  text-align:center;
  width:85%;
  max-width:400px;
  box-shadow:0 0 40px rgba(0,0,0,0.2);
  color:white;
}

h1{font-size:38px;margin:0;}
p{font-size:20px;}

#mensaje{
  min-height:60px;
  margin-top:25px;
  font-size:22px;
}

button{
  margin-top:25px;
  padding:15px 35px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* corazones */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:25px;
  animation: subir 6s linear infinite;
}
@keyframes subir{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-110vh) scale(1.5);}
}
</style>
</head>

<body>

<!-- Música -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="card">
  <h1>Hola hermosa 💖</h1>
  <p>Tengo algo que decirte...</p>
  <div id="mensaje"></div>
  <button onclick="siguiente()">Toca aquí 💌</button>
</div>

<script>
let mensajes = [
"Desde que llegaste todo es más bonito ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa ilumina mis días ☀️",
"Eres alguien muy especial 🌸",
"Y quería que supieras algo...",
"Me gustas muchísimo ❤️"
];

let i=0;
function siguiente(){
  if(i < mensajes.length){
    document.getElementById("mensaje").innerHTML = mensajes[i];
    i++;
  }else{
    document.querySelector(".card").innerHTML =
    "<h1>💖</h1><h2>¿Quieres salir conmigo?</h2>";
  }
}

/* corazones flotando */
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},300);
</script>

</body>
</html>
