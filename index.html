<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body{
  margin:0;
  font-family: Arial;
  text-align:center;
  background: linear-gradient(#ff9a9e,#fad0c4);
  overflow:hidden;
}

h1{
  margin-top:80px;
  color:white;
  font-size:45px;
}

#mensaje{
  color:white;
  font-size:28px;
  margin-top:40px;
  min-height:40px;
}

button{
  padding:18px 35px;
  font-size:22px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  margin-top:30px;
}

/* corazones */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:25px;
  animation: subir 6s linear infinite;
}

@keyframes subir{
  0%{transform:translateY(0);}
  100%{transform:translateY(-110vh);}
}
</style>
</head>

<body>

<h1>Hola hermosa 💖</h1>
<p style="color:white;font-size:22px;">Tengo algo que decirte...</p>

<div id="mensaje"></div>
<button onclick="siguiente()">Toca aquí 💌</button>

<script>
let mensajes = [
"Desde que llegaste todo es más bonito ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa alegra mis días 😊",
"Eres una persona increíble 🌸",
"Y quería que supieras algo importante...",
"Me gustas muchísimo ❤️"
];

let i = 0;

function siguiente(){
  if(i < mensajes.length){
    document.getElementById("mensaje").innerHTML = mensajes[i];
    i++;
  }else{
    alert("Prometo seguir creando momentos bonitos contigo 💖");
  }
}

// corazones flotando
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},300);
</script>

</body>
</html>
