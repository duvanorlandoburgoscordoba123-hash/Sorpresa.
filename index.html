<script>
let videoIniciado=false;

let mensajes=[
"Hola 😊",
"Quería decirte algo...",
"No sabía cómo hacerlo 🙈",
"Así que hice esta web para ti 💻",
"Porque eres muy especial ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa alegra mis días ☀️",
"Y cada día me gustas más...",
"Así que quería preguntarte algo..."
];

let i=0;

function agregarMensaje(texto){
  let div=document.createElement("div");
  div.className="msg yo";
  div.innerHTML=texto;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=9999;
}

function siguiente(){

  if(!videoIniciado){
    let v=document.getElementById("video");
    v.style.display="block";
    v.muted=false;
    v.volume=1;
    v.play();
    videoIniciado=true;
  }

  if(i<mensajes.length){
    agregarMensaje(mensajes[i]);
    i++;
  }else{
    document.getElementById("app").innerHTML=
    "<div style='color:white;text-align:center;margin-top:180px'>" +
    "<h1>💖</h1><h2>¿Quieres salir conmigo?</h2>" +
    "<br><button onclick='poemaBenedetti()'>SI 💕</button>" +
    "<br><br><button onclick='poemaNeruda()'>OBVIO SI 😍</button></div>";
  }
}

document.body.innerHTML=`

</video>

<div style="position:absolute;color:white;text-align:center;padding:40px;margin-top:20vh;font-size:28px">
