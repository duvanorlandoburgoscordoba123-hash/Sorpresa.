<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro chat 💬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* fondo burbujas */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:url("https://i.imgur.com/YKY28eT.png");
  animation:mover 60s linear infinite;
  opacity:0.15;
}
@keyframes mover{
  from{transform:translate(0,0);}
  to{transform:translate(-50%,-50%);}
}

/* telefono */
.phone{
  width:360px;
  height:640px;
  background:#111b21;
  border-radius:35px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  overflow:hidden;
  position:relative;
}

.header{
  background:#202c33;
  color:white;
  padding:15px;
  font-size:18px;
}

.chat{
  padding:15px;
  height:480px;
  overflow-y:auto;
}

.msg{
  padding:10px 15px;
  border-radius:15px;
  margin:10px 0;
  max-width:75%;
  animation:fade 0.5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1}}

.yo{
  background:#005c4b;
  color:white;
  margin-left:auto;
}

.btnArea{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#25d366;
  color:white;
  font-size:16px;
}
.heart{
  position:fixed;
  bottom:-20px;
  font-size:22px;
  animation:subir 6s linear infinite;
}
@keyframes subir{
  0%{transform:translateY(0)}
  100%{transform:translateY(-110vh)}
}
</style>
</head>

<body>

<audio id="musica" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="phone">
  <div class="header">💬 Tú & Yo</div>
  <div class="chat" id="chat"></div>
  <div class="btnArea">
    <button onclick="siguiente()">Enviar mensaje 💌</button>
  </div>
</div>

<script>
let musica=false;

let mensajes=[
"Hola 😊",
"Quería decirte algo...",
"Pero no sabía cómo hacerlo 🙈",
"Así que decidí crear esto para ti 💻",
"Porque eres muy especial ✨",
"Me encanta hablar contigo 💕",
"Tu sonrisa alegra mis días ☀️",
"Y cada día me gustas más...",
"Así que quería preguntarte algo..."
];

let i=0;

function agregarMensaje(texto){
  let div=document.createElement("div");
  div.className="msg yo";
  div.innerHTML=texto;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=9999;
}

function siguiente(){

  if(!musica){
    document.getElementById("musica").play();
    musica=true;
  }

  if(i<mensajes.length){
    agregarMensaje(mensajes[i]);
    i++;
  }else{
    document.querySelector(".phone").innerHTML=
    "<div style='color:white;text-align:center;margin-top:200px'>" +
    "<h1>💖</h1><h2>¿Quieres salir conmigo?</h2>" +
    "<br><button onclick='final()'>SI 💕</button>" +
    "<br><br><button onclick='final()'>OBVIO SI 😍</button></div>";
  }
}

function final(){
  document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh'>Sabía que dirías que sí 😍</h1>";
}

setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},300);
</script>

</body>
</html>
