<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Una sorpresa para ti ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    overflow:hidden;
}

#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;
}

button{
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

#video{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:none;
}

#question{
    position:absolute;
    bottom:80px;
    width:100%;
    display:none;
}

#poem{
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    font-size:28px;
    padding:40px;
    animation:fade 2s;
}

@keyframes fade{
    from{opacity:0}
    to{opacity:1}
}
</style>
</head>

<body>

<!-- Pantalla inicial -->
<div id="startScreen">
    <h1>Tengo algo especial para ti ❤️</h1>
    <button onclick="start()">Tocar pantalla ✨</button>
</div>

<!-- VIDEO -->
<video id="video" autoplay loop>
    <source src="https://raw.githubusercontent.com/duvanorlandoburgoscordoba123-hash/Sorpresa./5ff4a88c2d22c549c1116d0dd1a855ab248091a5/eb2c0940c76e0b8a96065f4f27d1b4a2.mp4" type="video/mp4">
</video>

<!-- PREGUNTA -->
<div id="question">
    <h1>¿Quieres salir conmigo? 💕</h1>
    <button onclick="yes()">Sí 😍</button>
    <button onclick="no()">No 😢</button>
</div>

<!-- POEMA -->
<div id="poem">
<div>
“Te amo sin saber cómo, ni cuándo, ni de dónde.<br><br>
Te amo directamente sin problemas ni orgullo:<br><br>
así te amo porque no sé amar de otra manera.”<br><br>
<h3>— Pablo Neruda</h3>
</div>
</div>

<script>

function start(){
    document.getElementById("startScreen").style.display="none";

    let video = document.getElementById("video");
    video.style.display="block";

    video.muted = false;
    video.volume = 1;
    video.play();

    // mostrar pregunta después de 6 segundos
    setTimeout(()=>{
        document.getElementById("question").style.display="block";
    },6000);
}

function yes(){
    document.getElementById("poem").style.display="flex";
}

function no(){
    alert("Piénsalo otra vez 😌❤️");
}

</script>

</body>
</html>
